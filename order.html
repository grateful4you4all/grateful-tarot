<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>自動訂單</title><link rel="stylesheet" href="style.css"></head><body><div id="app"></div><script src="config.js"></script><script src="order.js"></script><script>
async function loadContent(){const r=await fetch('site-content.json');return await r.json();}
function navHtml(active,c){const nav=[['首頁','index.html'],['協會介紹','about.html'],['牌義資料庫','library.html'],['抽牌占卜','draw.html'],['報名系統','signup.html'],['協會活動','events.html'],['書籍專區','books.html'],['自動訂單','order.html'],['會員專區','members.html'],['聯絡我們','contact.html']];return `<div class="topbar"><div class="container"><div class="brand"><img src="logo-official.svg"><div><small>${c.siteEnglish}</small><strong>${c.siteName}</strong></div></div><nav>${nav.map(([n,h])=>`<a href="${h}" class="${active===n?'active':''}">${n}</a>`).join('')}</nav><a class="btn primary" href="order.html">立即下單</a></div></div>`;}

loadContent().then(c=>{document.getElementById('app').innerHTML=navHtml('自動訂單',c)+`<div class="container"><section class="section"><div class="glass"><div class="kicker">Auto Order + Payment</div><h2>${c.orderTitle}</h2><div class="grid two" style="margin-top:16px"><div class="card"><h3>填寫訂單</h3><form id="orderForm" onsubmit="submitOrderForm(event)"><div class="form-grid"><div><label>姓名</label><input name="name" required></div><div><label>手機</label><input name="phone" required></div><div><label>Email</label><input name="email" type="email" required></div><div><label>商品</label><select name="product"><option>${c.bookTitle}-實體書</option><option>${c.bookTitle}-電子書</option></select></div><div><label>付款方式</label><select name="payment_method"><option>LINE Pay</option><option>綠界信用卡/ATM</option><option>銀行轉帳</option></select></div><div><label>備註</label><input name="notes"></div></div><div style="margin-top:16px"><button class="primary" type="submit">送出訂單</button></div></form><div id="resultBox" class="notice" style="margin-top:16px">尚未送出訂單。</div></div><div class="card"><h3>一鍵修改位置</h3><div class="small">商品名稱與價格請改 <b>site-content.json</b><br>金流請改 <b>config.js</b><br>接單程式請改 <b>apps-script-template.gs</b></div></div></div></div></section></div>`;});
</script></body></html>
