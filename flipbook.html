<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>線上試閱</title>

<style>
body{
  margin:0;
  background:#0b0f2a;
  color:white;
  font-family:Arial;
  text-align:center;
}

/* 書本容器 */
.book{
  width:800px;
  height:500px;
  margin:50px auto;
  perspective:2000px;
  position:relative;
}

/* 單頁 */
.page{
  width:50%;
  height:100%;
  position:absolute;
  top:0;
  left:50%;
  transform-origin:left;
  transform-style:preserve-3d;
  transition:0.8s;
}

.page img{
  width:100%;
  height:100%;
  object-fit:contain;
  background:white;
}

/* 翻頁效果 */
.flipped{
  transform:rotateY(-180deg);
}

/* 按鈕 */
button{
  padding:10px 20px;
  margin:10px;
  border:none;
  border-radius:20px;
  background:#f0b35d;
  color:#000;
  font-size:16px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>📖 線上試閱（真實翻頁）</h2>

<div class="book" id="book"></div>

<div>
<button onclick="prevPage()">上一頁</button>
<button onclick="nextPage()">下一頁</button>
</div>

<script>
const images = [
"preview1.jpg",
"preview2.jpg",
"preview3.jpg",
"preview4.jpg",
"preview5.jpg",
"preview6.jpg",
"preview7.jpg",
"preview8.jpg"
];

let current = 0;
const book = document.getElementById("book");

// 建立頁面
images.forEach((src, i)=>{
  const page = document.createElement("div");
  page.className = "page";
  page.style.zIndex = images.length - i;

  const img = document.createElement("img");
  img.src = src;

  page.appendChild(img);
  book.appendChild(page);
});

// 翻頁控制
function update(){
  const pages = document.querySelectorAll(".page");
  pages.forEach((p,i)=>{
    if(i < current){
      p.classList.add("flipped");
    }else{
      p.classList.remove("flipped");
    }
  });
}

function nextPage(){
  if(current < images.length){
    current++;
    update();
  }
}

function prevPage(){
  if(current > 0){
    current--;
    update();
  }
}
</script>

</body>
</html>
