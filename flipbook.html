<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>電子書試閱</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js"></script>

<style>
body {
  background: #0f172a;
  margin: 0;
  padding: 40px 0;
  font-family: sans-serif;
}

/* 外框（控制大小） */
.flipbook-wrapper {
  width: 90%;
  max-width: 900px;
  margin: auto;
}

/* 書本 */
#flipbook {
  width: 100%;
  height: 600px;
}

/* 每頁 */
.page {
  background: white;
}

/* 圖片 */
.page img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
</style>
</head>

<body onload="checkMode()">

<div class="flipbook-wrapper">
  <div id="flipbook">

    <div class="page"><img src="preview1.jpg"></div>
    <div class="page"><img src="preview2.jpg"></div>
    <div class="page"><img src="preview3.jpg"></div>
    <div class="page"><img src="preview4.jpg"></div>
    <div class="page"><img src="preview5.jpg"></div>
    <div class="page"><img src="preview6.jpg"></div>
    <div class="page"><img src="preview7.jpg"></div>
    <div class="page"><img src="preview8.jpg"></div>

  </div>
</div>

<script>
$("#flipbook").turn({
  width: $(".flipbook-wrapper").width(),
  height: 600,
  autoCenter: true
});

$(window).resize(function() {
  $("#flipbook").turn(
    "size",
    $(".flipbook-wrapper").width(),
    600
  );
});
  function checkMode(){
  const params = new URLSearchParams(window.location.search);
  const mode = params.get("mode");
  if(mode === "fullscreen"){
    openLightbox();
  }
}
</script>

</body>
</html>
