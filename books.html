<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>書籍專區｜真實翻頁書動畫版</title><link rel="stylesheet" href="style.css"></head><body><div id="app"></div><script>
async function loadContent(){ return await (await fetch('site-content.json')).json(); }
function nav(c, active){
  const items=[['首頁','index.html'],['協會介紹','about.html'],['牌義資料庫','library.html'],['抽牌占卜','draw.html'],['協會活動','events.html'],['書籍專區','books.html']];
  return `<div class="topbar"><div class="container">
    <div class="brand"><img src="logo.svg"><div><small>${c.siteEnglish}</small><strong>${c.siteName}</strong></div></div>
    <nav>${items.map(([n,h])=>`<a href="${h}" class="${active===h?'active':''}">${n}</a>`).join('')}</nav>
  </div></div>`;
}

loadContent().then(c=>{
 const imgs=['preview1.jpg','preview2.jpg','preview3.jpg','preview4.jpg','preview5.jpg','preview6.jpg','preview7.jpg','preview8.jpg'];
 let page=0, flipClass='';
 function render(){
   const left=Math.max(0,page-1), right=page, nextIndex=Math.min(imgs.length-1,page+1);
   document.getElementById('app').innerHTML = nav(c,'books.html') + `
   <div class="container section"><div class="glass"><div class="kicker">BOOKS & PREVIEW</div><h2 style="margin-top:0">書籍專區｜${c.bookTitle}</h2>
   <div class="grid two"><div class="card"><h3>書籍封面</h3><img src="book-cover.jpg" class="cover" alt="書籍封面"></div><div class="card"><h3>書籍資訊</h3><div class="small">作者：${c.bookAuthor}</div><div class="price-box"><div class="price-item"><span class="label">實體書</span><span class="price">${c.bookPricePhysical}</span></div><div class="price-item"><span class="label">電子書</span><span class="price">${c.bookPriceEbook}</span></div></div><div class="small" style="margin-top:12px">${c.bookText}</div><div class="preview-actions"><a class="btn primary" href="#preview-reader">開始試閱</a><a class="btn" href="#" onclick="openLightbox();return false;">全螢幕閱讀</a></div></div></div>
   <div class="flipbook-shell" id="preview-reader"><div class="flipbook-head"><div><h3 style="margin:0 0 6px 0">線上試閱｜真實翻頁動畫</h3><div class="small">模擬書頁翻動感，閱讀方式比前一版更接近真實翻頁書。</div></div><div class="flipbook-count">第 ${page+1} / ${imgs.length} 頁</div></div>
   <div class="flipbook-stage"><button class="book-nav left" onclick="prevPage()" ${page===0?'disabled':''}>‹</button><div class="flipbook-book"><div class="book-base"><div class="base-page"><img src="${imgs[left]}" alt="左頁"></div><div class="base-page"><img src="${imgs[right]}" alt="右頁"></div></div><div class="flip-page ${flipClass}"><div class="front"><img src="${imgs[page]}" alt="翻頁正面"></div><div class="back"><img src="${imgs[nextIndex]}" alt="翻頁背面"></div></div></div><button class="book-nav right" onclick="nextPage()" ${page===imgs.length-1?'disabled':''}>›</button><div class="book-hint">可按左右鍵翻頁，也可點下方縮圖</div></div>
   <div class="thumb-strip">${imgs.map((src,idx)=>`<button class="thumb-btn ${idx===page?'active':''}" onclick="goPage(${idx})"><img src="${src}" alt="第${idx+1}頁縮圖"><span>第${idx+1}頁</span></button>`).join('')}</div></div></div></div>
   <div class="ebook-lightbox" id="lightbox" onclick="closeLightbox(event)"><div class="ebook-lightbox-inner" onclick="event.stopPropagation()"><button class="lightbox-close" onclick="forceCloseLightbox()">✕</button><button class="lightbox-nav" onclick="prevPage();setTimeout(keepOpen,0)">‹</button><img src="${imgs[page]}" alt="大圖試閱"><button class="lightbox-nav" onclick="nextPage();setTimeout(keepOpen,0)">›</button></div></div>`;
   if(flipClass) setTimeout(()=>{ flipClass=''; render(); }, 860);
 }
 window.prevPage=()=>{ if(page>0){ flipClass='flip-backward'; page--; render(); keepOpen(); } };
 window.nextPage=()=>{ if(page<imgs.length-1){ flipClass='flip-forward'; page++; render(); keepOpen(); } };
 window.goPage=(n)=>{ if(n===page) return; flipClass=n>page?'flip-forward':'flip-backward'; page=n; render(); };
 window.openLightbox=()=>{ document.getElementById('lightbox')?.classList.add('show'); };
 window.keepOpen=()=>{ document.getElementById('lightbox')?.classList.add('show'); };
 window.closeLightbox=(e)=>{ if(e.target && e.target.id==='lightbox') document.getElementById('lightbox')?.classList.remove('show'); };
 window.forceCloseLightbox=()=>{ document.getElementById('lightbox')?.classList.remove('show'); };
 document.addEventListener('keydown',(e)=>{ const open=document.getElementById('lightbox')?.classList.contains('show'); if(e.key==='ArrowLeft') prevPage(); if(e.key==='ArrowRight') nextPage(); if(e.key==='Escape' && open) forceCloseLightbox(); });
 render();
});
</script></body></html>
