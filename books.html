<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>書籍專區</title><link rel="stylesheet" href="style.css"></head><body><div id="app"></div><script>
async function loadContent(){return await (await fetch('site-content.json')).json();}
function nav(c,active){
 const items=[['首頁','index.html'],['協會介紹','about.html'],['牌義資料庫','library.html'],['抽牌占卜','draw.html'],['協會活動','events.html'],['書籍專區','books.html']];
 return `<div class="topbar"><div class="container">
 <div class="brand"><img src="logo.svg"><div><small>${c.siteEnglish}</small><strong>${c.siteName}</strong></div></div>
 <nav>${items.map(([n,h])=>`<a href="${h}" class="${active===h?'active':''}">${n}</a>`).join('')}</nav>
 </div></div>`;
}

loadContent().then(c=>{
 const imgs=['preview4.jpg','preview5.jpg','preview6.jpg','preview7.jpg','preview8.jpg']; let i=0;
 function render(){
  document.getElementById('app').innerHTML=nav(c,'books.html')+`
  <div class="container section"><div class="glass">
    <div class="kicker">BOOKS & PREVIEW</div>
    <h2>書籍專區｜${c.bookTitle}</h2>
    <div class="grid two">
      <div class="card"><h3>書籍封面</h3><img src="book-cover.jpg" class="cover"></div>
      <div class="card"><h3>書籍資訊</h3><div class="small">作者：${c.bookAuthor}</div>
        <div class="price-box">
          <div class="price-item"><span class="label">實體書</span><span class="price">${c.bookPricePhysical}</span></div>
          <div class="price-item"><span class="label">電子書</span><span class="price">${c.bookPriceEbook}</span></div>
        </div>
        <div class="small" style="margin-top:10px">${c.bookText}</div>
      </div>
    </div>
    <div class="card ebook-flipbook-card" style="margin-top:20px">
      <div class="ebook-flipbook-header"><div><h3 style="margin:0 0 6px 0">電子書翻頁試閱</h3><div class="small">點左右按鈕翻頁，也可以點下面縮圖切換頁面。</div></div><div class="ebook-page-counter">第 ${i+1} / ${imgs.length} 頁</div></div>
      <div class="ebook-stage">
        <button class="ebook-nav-btn" onclick="prevPage()" ${i===0?'disabled':''}>‹</button>
        <div class="ebook-page-frame"><img src="${imgs[i]}" class="ebook-page-image"></div>
        <button class="ebook-nav-btn" onclick="nextPage()" ${i===imgs.length-1?'disabled':''}>›</button>
      </div>
      <div class="ebook-thumb-row">${imgs.map((x,idx)=>`<div class="ebook-thumb ${idx===i?'ebook-thumb-active':''}" onclick="goPage(${idx})"><img src="${x}"><span>第${idx+1}頁</span></div>`).join('')}</div>
    </div>
  </div></div>`;
 }
 window.prevPage=()=>{if(i>0){i--;render();}};
 window.nextPage=()=>{if(i<imgs.length-1){i++;render();}};
 window.goPage=(n)=>{i=n;render();};
 render();
});</script></body></html>
