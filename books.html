<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>books</title><link rel="stylesheet" href="style.css"></head><body><div id="app"></div><script>
async function loadContent(){const r=await fetch('site-content.json');return await r.json();}
function navHtml(active,c){const nav=[['首頁','index.html'],['協會介紹','about.html'],['牌義資料庫','library.html'],['抽牌占卜','draw.html'],['報名系統','signup.html'],['協會活動','events.html'],['書籍專區','books.html'],['自動訂單','order.html'],['會員專區','members.html'],['聯絡我們','contact.html']];return `<div class="topbar"><div class="container"><div class="brand"><img src="logo-official.svg"><div><small>${c.siteEnglish}</small><strong>${c.siteName}</strong></div></div><nav>${nav.map(([n,h])=>`<a href="${h}" class="${active===n?'active':''}">${n}</a>`).join('')}</nav><a class="btn primary" href="order.html">立即下單</a></div></div>`;}
loadContent().then(c=>{document.getElementById('app').innerHTML=navHtml('書籍專區',c)+`<div class="container"><section class="section"><div class="glass"><div class="kicker">Books & Preview</div><h2>書籍專區｜${c.bookTitle}</h2><div class="grid two" style="margin-top:16px"><div class="card"><h3>書籍封面</h3><img src="./book-cover.jpg" class="cover"></div><div class="card"><h3>書籍資訊</h3><div class="small">書名：${c.bookTitle}</div><div class="small">作者：${c.bookAuthor}</div><div style="font-size:24px;font-weight:700;color:#ffd37a;margin-top:14px;">實體書 ${c.bookPricePhysical}</div><div style="font-size:24px;font-weight:700;color:#ffd37a;margin-top:8px;">電子書 ${c.bookPriceEbook}</div><div class="small" style="margin-top:12px;">${c.bookText}</div><div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:18px;"><a class="btn primary" href="order.html">立即下單</a><a class="btn" href="#preview">索取試閱</a></div></div></div><div class="card" id="preview" style="margin-top:18px;"><h3>試閱讀內頁（8頁）</h3><div class="preview-grid">${[1,2,3,4,5,6,7,8].map(i=>`<div><img src="./preview${i}.jpg"><div class="page-label">試閱第 ${i} 頁</div></div>`).join('')}</div></div></div></section></div>`;});</script></body></html>
