
<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>書籍專區</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app"></div>
<script>
async function loadContent(){return await (await fetch('site-content.json')).json();}
function nav(c){
 return `<div class="topbar"><div class="container">
 <div class="brand"><img src="logo.png"><div><small>${c.siteEnglish}</small><strong>${c.siteName}</strong></div></div>
 <nav>
 <a href="index.html">首頁</a>
 <a href="about.html">協會介紹</a>
 <a href="library.html">牌義資料庫</a>
 <a href="draw.html">抽牌占卜</a>
 <a href="events.html">協會活動</a>
 <a href="books.html" class="active">書籍專區</a>
 </nav>
 <a class="btn primary" href="#">立即下單</a>
 </div></div>`;
}
loadContent().then(c=>{
 const imgs=["preview4.jpg","preview5.jpg","preview6.jpg","preview7.jpg","preview8.jpg"];
 let i=0;
 function render(){
  document.getElementById("app").innerHTML = nav(c)+`
  <div class="container">
  <section class="section">
  <div class="glass">
  <div class="kicker">BOOKS & PREVIEW</div>
  <h2>書籍專區｜${c.bookTitle}</h2>

  <div class="grid two">
    <div class="card">
      <h3>書籍封面</h3>
      <img src="book-cover.jpg" class="cover">
    </div>
    <div class="card">
      <h3>書籍資訊</h3>
      <div>作者：${c.bookAuthor}</div>
      <div class="price-box">
        <div class="price-item"><span class="label">實體書</span><span class="price">${c.bookPricePhysical}</span></div>
        <div class="price-item"><span class="label">電子書</span><span class="price">${c.bookPriceEbook}</span></div>
      </div>
      <div style="margin-top:10px">${c.bookText}</div>
    </div>
  </div>

  <div class="card ebook-flipbook-card">
    <div class="ebook-stage">
      <button class="ebook-nav-btn" onclick="prev()">‹</button>
      <div class="ebook-page-frame">
        <img src="${imgs[i]}" class="ebook-page-image">
      </div>
      <button class="ebook-nav-btn" onclick="next()">›</button>
    </div>
    <div class="ebook-thumb-row">
      ${imgs.map((x,idx)=>`<div class="ebook-thumb ${idx===i?'ebook-thumb-active':''}" onclick="go(${idx})"><img src="${x}"></div>`).join("")}
    </div>
  </div>

  </div></section></div>`;
 }
 window.prev=()=>{if(i>0){i--;render();}}
 window.next=()=>{if(i<imgs.length-1){i++;render();}}
 window.go=(n)=>{i=n;render();}
 render();
});
</script>
</body>
</html>
