<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>書籍專區</title>

<style>
body {
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color: #fff;
  font-family: sans-serif;
  margin: 0;
}

.container {
  max-width: 1100px;
  margin: 60px auto;
  display: flex;
  gap: 40px;
  align-items: center;
}

.book {
  flex: 1;
}

.book img {
  width: 100%;
  border-radius: 20px;
}

.info {
  flex: 1;
}

.price-box {
  display: flex;
  gap: 20px;
  margin: 20px 0;
}

.price {
  background: #1e293b;
  padding: 20px;
  border-radius: 15px;
}

.price h3 {
  margin: 0;
  color: #fbbf24;
}

.btn {
  display: inline-block;
  padding: 14px 24px;
  border-radius: 999px;
  background: #334155;
  color: #fff;
  text-decoration: none;
  margin-right: 10px;
}

.btn.primary {
  background: #f59e0b;
  color: #000;
}
</style>
</head>

<body>

<div class="container">

  <!-- 左：書 -->
  <div class="book">
    <img src="book-cover.jpg">
  </div>

  <!-- 右：資訊 -->
  <div class="info">
    <h1>維納斯羅盤塔羅</h1>
    <p>作者：Minnie 張明妮</p>

    <div class="price-box">
      <div class="price">
        <h3>實體書 NT$500</h3>
      </div>
      <div class="price">
        <h3>電子書 NT$380</h3>
      </div>
    </div>

    <p>適合塔羅學習、教學與自我探索使用。</p>

    <!-- ⭐關鍵：直接開 flipbook -->
    <a href="flipbook.html" class="btn primary">開始試閱</a>
    <a href="flipbook.html?mode=fullscreen" class="btn">全螢幕閱讀</a>

  </div>

</div>

</body>
</html>
