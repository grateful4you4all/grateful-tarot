<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>首頁</title><link rel="stylesheet" href="style.css"></head><body><div id="app"></div><script>
async function loadContent(){return await (await fetch('site-content.json')).json();}
function nav(c,active){
 const items=[['首頁','index.html'],['協會介紹','about.html'],['牌義資料庫','library.html'],['抽牌占卜','draw.html'],['協會活動','events.html'],['書籍專區','books.html']];
 return `<div class="topbar"><div class="container">
 <div class="brand"><img src="logo.svg"><div><small>${c.siteEnglish}</small><strong>${c.siteName}</strong></div></div>
 <nav>${items.map(([n,h])=>`<a href="${h}" class="${active===h?'active':''}">${n}</a>`).join('')}</nav>
 </div></div>`;
}

loadContent().then(c=>{document.getElementById('app').innerHTML=nav(c,'index.html')+`
<div class="container section"><div class="hero">
<div class="glass"><div class="kicker">GRATEFUL TAROT UNION</div><h1>${c.heroTitle}</h1><div class="small">${c.heroText}</div><p><a class="btn primary" href="books.html">前往書籍專區</a></p></div>
<div class="glass"><img src="logo.svg" style="width:220px;display:block;margin:20px auto"></div>
</div></div>`;});</script></body></html>
