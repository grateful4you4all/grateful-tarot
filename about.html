<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>協會介紹</title><link rel="stylesheet" href="style.css"></head><body><div class="topbar"><div class="container"><div class="brand"><img src="logo-official.svg"><div><small>GRATEFUL TAROT UNION</small><strong>古拉佛中西靈學塔羅協會</strong></div></div><nav><a href="index.html" class="">首頁</a><a href="about.html" class="active">協會介紹</a><a href="library.html" class="">牌義資料庫</a><a href="draw.html" class="">抽牌占卜</a><a href="signup.html" class="">報名系統</a><a href="events.html" class="">協會活動</a><a href="books.html" class="">書籍專區</a><a href="order.html" class="">自動訂單</a><a href="members.html" class="">會員專區</a><a href="contact.html" class="">聯絡我們</a></nav><a class="btn primary" href="order.html">立即報名</a></div></div><div class="container"><section class="section"><div class="glass"><div class="kicker">Association Overview</div><h2>協會介紹</h2><div class="card"><h3>協會成立宗旨</h3><div class="small">本會為依法設立、非以營利為目的之公益性社會團體，以推廣塔羅哲學思考邏輯，提升自我探索為宗旨。</div></div><div class="card" style="margin-top:16px"><h3>本會之任務</h3><div class="small">一、推廣中西塔羅哲學文化與心靈成長課程。<br>二、舉辦相關講座、研習、展演、活動及出版刊物。<br>三、促進會員間學術與實務交流，提升塔羅研究與應用水準。<br>四、推廣身心靈健康理念，結合塔羅哲學文化進行公益活動。<br>五、與國內外相關團體進行學術與文化交流。</div></div></div></section></div></body></html>
