<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>about</title><link rel="stylesheet" href="style.css"></head><body><div id="app"></div><script>
async function loadContent(){const r=await fetch('site-content.json');return await r.json();}
function navHtml(active,c){const nav=[['首頁','index.html'],['協會介紹','about.html'],['牌義資料庫','library.html'],['抽牌占卜','draw.html'],['報名系統','signup.html'],['協會活動','events.html'],['書籍專區','books.html'],['自動訂單','order.html'],['會員專區','members.html'],['聯絡我們','contact.html']];return `<div class="topbar"><div class="container"><div class="brand"><img src="logo-official.svg"><div><small>${c.siteEnglish}</small><strong>${c.siteName}</strong></div></div><nav>${nav.map(([n,h])=>`<a href="${h}" class="${active===n?'active':''}">${n}</a>`).join('')}</nav><a class="btn primary" href="order.html">立即下單</a></div></div>`;}
loadContent().then(c=>{document.getElementById('app').innerHTML=navHtml('協會介紹',c)+`<div class="container"><section class="section"><div class="glass"><div class="kicker">Association Overview</div><h2>協會介紹</h2><div class="card"><h3>${c.aboutPurposeTitle}</h3><div class="small">${c.aboutPurposeText}</div></div><div class="card" style="margin-top:16px"><h3>${c.aboutMissionTitle}</h3><div class="small">${c.aboutMissionList.map((m,i)=>`${i+1}、${m}`).join('<br>')}</div></div></div></section></div>`;});</script></body></html>
