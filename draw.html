<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>抽牌占卜</title><link rel="stylesheet" href="style.css"></head><body><div class="topbar"><div class="container"><div class="brand"><img src="logo-official.svg"><div><small>GRATEFUL TAROT UNION</small><strong>古拉佛中西靈學塔羅協會</strong></div></div><nav><a href="index.html" class="">首頁</a><a href="about.html" class="">協會介紹</a><a href="library.html" class="">牌義資料庫</a><a href="draw.html" class="active">抽牌占卜</a><a href="signup.html" class="">報名系統</a><a href="events.html" class="">協會活動</a><a href="books.html" class="">書籍專區</a><a href="order.html" class="">自動訂單</a><a href="members.html" class="">會員專區</a><a href="contact.html" class="">聯絡我們</a></nav><a class="btn primary" href="order.html">立即報名</a></div></div><div class="container"><section class="section"><div class="glass"><div class="kicker">Tarot Draw</div><h2>抽牌占卜</h2><div id="drawApp"></div></div></section></div><script>const cards=[{"group": "大阿卡納", "name": "愚者", "element": "風", "upright": "新的旅程展開，帶著信任與勇氣前進。", "reversed": "開始之前仍有猶豫、逃避或魯莽衝動。", "psychology": "反映脫離舊框架、回到本真與自由的渴望。", "advice": "帶著開放與基本判斷上路。"}, {"group": "大阿卡納", "name": "魔術師", "element": "風", "upright": "具備開始與實現的條件。", "reversed": "能量被錯用、濫用或無法聚焦。", "psychology": "關乎自我效能感與表達需求。", "advice": "少一點炫技，多一點落實。"}, {"group": "大阿卡納", "name": "女祭司", "element": "水", "upright": "答案在安靜之後的內在感知。", "reversed": "忽略直覺，或被壓抑情緒困住。", "psychology": "象徵深層自我與內在智慧。", "advice": "先沉澱，再下結論。"}, {"group": "權杖", "name": "權杖Ace", "element": "火", "upright": "新的行動與創造力啟動。", "reversed": "起步困難，能量分散。", "psychology": "反映企圖心與動能的點燃。", "advice": "把第一步踏出去。"}, {"group": "聖杯", "name": "聖杯2", "element": "水", "upright": "連結、吸引與關係互動。", "reversed": "互動失衡、猶豫或誤解。", "psychology": "反映親密、投射與互相回應。", "advice": "先確認彼此是否真正理解。"}];let state={drawCount:3,drawn:[],ai:""};const layouts={1:["當下核心"],3:["過去","現在","未來"],5:["現況","阻礙","建議","潛意識","結果"]};function drawCards(){const pool=[...cards],picks=[];for(let i=0;i<state.drawCount;i++){const idx=Math.floor(Math.random()*pool.length);const c=pool.splice(idx,1)[0];const rev=Math.random()<0.5;picks.push({...c,position:layouts[state.drawCount][i],orientation:rev?"逆位":"正位",summary:rev?c.reversed:c.upright});}state.drawn=picks;state.ai="";render();}function aiRead(){if(!state.drawn.length){state.ai="請先完成抽牌，再進行 AI 解牌。";render();return;}state.ai=state.drawn.map(c=>`${c.position}：${c.name}${c.orientation}｜${c.summary}`).join("\n");render();}function render(){const options=[1,3,5].map(n=>`<button class="${state.drawCount===n?'option-active':''}" onclick="state.drawCount=${n};render()">${n} 張</button>`).join("");const cardsHtml=state.drawn.length?state.drawn.map(c=>`<div class="card"><h3>${c.position}</h3><div class="small">${c.name}・${c.orientation}</div><div class="small" style="margin-top:8px">${c.summary}</div></div>`).join(""):`<div class="card" style="grid-column:1/-1">尚未抽牌，請先選擇張數再開始。</div>`;document.getElementById('drawApp').innerHTML=`<div class="small">點選 1、3、5 張時，被選到的按鈕會變成橘色。</div><div class="option-row">${options}<button class="btn primary" onclick="drawCards()">立即抽牌</button><button class="btn" onclick="aiRead()">AI 解牌</button></div><div class="grid three" style="margin-top:16px">${cardsHtml}</div><div class="card" style="margin-top:16px"><h3>AI 解牌結果</h3><div class="code">${state.ai || "抽牌後按下 AI 解牌，這裡會顯示結果。"}</div></div>`;}render();</script></body></html>
