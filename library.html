<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>牌義資料庫</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app"></div>
<script>

async function loadContent(){const r=await fetch('site-content.json');return await r.json();}
function navHtml(active,c){
  const nav=[['首頁','index.html'],['協會介紹','about.html'],['牌義資料庫','library.html'],['抽牌占卜','draw.html'],['報名系統','signup.html'],['協會活動','events.html'],['書籍專區','books.html'],['自動訂單','order.html'],['會員專區','members.html'],['聯絡我們','contact.html']];
  return `<div class="topbar"><div class="container"><div class="brand"><img src="logo-official.svg"><div><small>${c.siteEnglish}</small><strong>${c.siteName}</strong></div></div><nav>${nav.map(([n,h])=>`<a href="${h}" class="${active===n?'active':''}">${n}</a>`).join('')}</nav><a class="btn primary" href="order.html">立即下單</a></div></div>`;
}

loadContent().then(c=>{
  let state={ search:'', searchDraft:'', category:'全部', selectedName:(c.cards[0]&&c.cards[0].name)||'' };

  function normalize(v){ return String(v||'').toLowerCase(); }
  function cardSearchBlob(card){
    return [
      card.name, card.english, card.category, card.group, card.element, card.suit,
      ...(card.keywords || []), card.upright, card.reversed, card.psychology, card.advice, card.imagery, card.whoami
    ].join(' ');
  }
  function filtered(){
    const q = normalize(state.search).trim();
    return c.cards.filter(card => {
      const okCategory = state.category === '全部' || card.category === state.category;
      const okSearch = !q || normalize(cardSearchBlob(card)).includes(q);
      return okCategory && okSearch;
    });
  }
  function selected(){
    const list = filtered();
    return list.find(x => x.name === state.selectedName) || list[0] || c.cards[0];
  }
  function applySearch(){
    state.search = state.searchDraft;
    const list = filtered();
    if(list.length) state.selectedName = list[0].name;
    render();
  }
  function setCategory(cat){
    state.category = cat;
    const list = filtered();
    if(list.length) state.selectedName = list[0].name;
    render();
  }
  function selectCard(name){
    state.selectedName = name;
    render();
  }

  function render(){
    const list = filtered();
    if(list.length && !list.some(x => x.name === state.selectedName)) state.selectedName = list[0].name;
    const s = selected();

    document.getElementById('app').innerHTML = navHtml('牌義資料庫', c) + `
    <div class="container">
      <section class="section">
        <div class="glass">
          <div class="kicker">Tarot Library</div>
          <h2>78 張完整牌義資料庫</h2>
          <div class="small">已分類為：大阿卡納、宮廷人物牌、四元素數字牌。</div>

          <div class="library-grid" style="margin-top:18px">
            <div class="card">
              <label>關鍵字</label>
              <div class="search-row">
                <input
                  id="searchInput"
                  type="text"
                  placeholder="輸入牌名、關鍵字、元素..."
                  value="${String(state.searchDraft).replace(/"/g,'&quot;')}"
                >
                <button class="btn primary" onclick="window.__applySearch()">搜尋</button>
              </div>

              <div style="margin-top:16px">
                <label>分類</label>
                <div class="category-row">
                  ${['全部','大阿卡納','宮廷人物牌','四元素數字牌'].map(cat => `
                    <button
                      class="category-chip ${state.category===cat?'category-chip-active':''}"
                      onclick="window.__setCategory('${cat}')"
                    >${cat}</button>
                  `).join('')}
                </div>
              </div>

              <div class="small" style="margin-top:14px">共找到 ${list.length} 張</div>

              <div class="list tarot-card-list" style="margin-top:14px">
                ${list.map(card => `
                  <button class="tarot-item-card ${s && s.name===card.name ? 'tarot-item-card-active' : ''}" onclick="window.__librarySelect('${String(card.name).replace(/'/g, "\\'")}')">
                    <div class="tarot-item-top">
                      <div class="tarot-item-title">${card.name}</div>
                      <div class="tarot-item-dot"></div>
                    </div>
                    <div class="tarot-item-meta">${card.category}｜${card.element}${card.suit ? '｜'+card.suit : ''}</div>
                    <div class="tarot-item-tags">${(card.keywords||[]).slice(0,3).map(k=>`<span>${k}</span>`).join('')}</div>
                  </button>
                `).join('')}
              </div>
            </div>

            <div class="card tarot-detail-card">
              ${s ? `
                <div class="tarot-detail-header">
                  <div>
                    <h3 class="tarot-detail-title">${s.name}</h3>
                    <div class="small">${s.category}｜元素：${s.element}${s.suit ? '｜花色：'+s.suit : ''}</div>
                  </div>
                  <div class="tarot-detail-badge">${s.element}</div>
                </div>

                <div class="inline-tags" style="margin-top:16px">
                  ${(s.keywords || []).map(k => `<span>${k}</span>`).join('')}
                </div>

                <div class="tarot-section-block">
                  <span class="badge">正位</span>
                  <div class="small">${s.upright || ''}</div>
                </div>

                <div class="tarot-section-block">
                  <span class="badge">逆位</span>
                  <div class="small">${s.reversed || ''}</div>
                </div>

                <div class="tarot-section-block">
                  <span class="badge">心理分析</span>
                  <div class="small">${s.psychology || ''}</div>
                </div>

                <div class="tarot-section-block">
                  <span class="badge">圖像解析</span>
                  <div class="small">${s.imagery || ''}</div>
                </div>

                <div class="tarot-section-block">
                  <span class="badge">解讀建議</span>
                  <div class="small">${s.advice || ''}</div>
                </div>

                <div class="tarot-section-block">
                  <span class="badge">Who am I</span>
                  <div class="small">${s.whoami || ''}</div>
                </div>
              ` : `
                <h3>沒有找到符合條件的牌</h3>
                <div class="small">請調整關鍵字或分類。</div>
              `}
            </div>
          </div>
        </div>
      </section>
    </div>`;

    const input = document.getElementById('searchInput');
    if(input){
      input.addEventListener('input', e => {
        state.searchDraft = e.target.value;
      });
      input.addEventListener('keydown', e => {
        if(e.key === 'Enter'){
          e.preventDefault();
          applySearch();
        }
      });
    }
  }

  window.__applySearch = applySearch;
  window.__setCategory = setCategory;
  window.__librarySelect = selectCard;

  render();
});
</script>
</body>
</html>
