<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>牌義資料庫</title><link rel="stylesheet" href="style.css"></head><body><div class="topbar"><div class="container"><div class="brand"><img src="logo-official.svg"><div><small>GRATEFUL TAROT UNION</small><strong>古拉佛中西靈學塔羅協會</strong></div></div><nav><a href="index.html" class="">首頁</a><a href="about.html" class="">協會介紹</a><a href="library.html" class="active">牌義資料庫</a><a href="draw.html" class="">抽牌占卜</a><a href="signup.html" class="">報名系統</a><a href="events.html" class="">協會活動</a><a href="books.html" class="">書籍專區</a><a href="order.html" class="">自動訂單</a><a href="members.html" class="">會員專區</a><a href="contact.html" class="">聯絡我們</a></nav><a class="btn primary" href="order.html">立即報名</a></div></div><div class="container"><section class="section"><div class="glass"><div class="kicker">Tarot Library</div><h2>牌義資料庫</h2><div id="app"></div></div></section></div><script>const cards=[{"group": "大阿卡納", "name": "愚者", "element": "風", "upright": "新的旅程展開，帶著信任與勇氣前進。", "reversed": "開始之前仍有猶豫、逃避或魯莽衝動。", "psychology": "反映脫離舊框架、回到本真與自由的渴望。", "advice": "帶著開放與基本判斷上路。"}, {"group": "大阿卡納", "name": "魔術師", "element": "風", "upright": "具備開始與實現的條件。", "reversed": "能量被錯用、濫用或無法聚焦。", "psychology": "關乎自我效能感與表達需求。", "advice": "少一點炫技，多一點落實。"}, {"group": "大阿卡納", "name": "女祭司", "element": "水", "upright": "答案在安靜之後的內在感知。", "reversed": "忽略直覺，或被壓抑情緒困住。", "psychology": "象徵深層自我與內在智慧。", "advice": "先沉澱，再下結論。"}, {"group": "權杖", "name": "權杖Ace", "element": "火", "upright": "新的行動與創造力啟動。", "reversed": "起步困難，能量分散。", "psychology": "反映企圖心與動能的點燃。", "advice": "把第一步踏出去。"}, {"group": "聖杯", "name": "聖杯2", "element": "水", "upright": "連結、吸引與關係互動。", "reversed": "互動失衡、猶豫或誤解。", "psychology": "反映親密、投射與互相回應。", "advice": "先確認彼此是否真正理解。"}];let state={search:"",group:"全部",selected:"愚者"};function filtered(){return cards.filter(c=>(state.group==="全部"||c.group===state.group)&&(!state.search||JSON.stringify(c).includes(state.search)));}function selected(){return filtered().find(c=>c.name===state.selected)||filtered()[0]||cards[0];}function render(){const list=filtered(),s=selected();document.getElementById('app').innerHTML=`<div class="grid two" style="margin-top:16px"><div class="card"><div class="form-grid"><div><label>關鍵字</label><input value="${state.search.replace(/"/g,'&quot;')}" oninput="state.search=this.value;render()"></div><div><label>分類</label><select onchange="state.group=this.value;render()">${["全部","大阿卡納","權杖","聖杯"].map(g=>`<option ${state.group===g?'selected':''}>${g}</option>`).join("")}</select></div></div><div class="small" style="margin-top:12px">${list.map(c=>`<button class="btn" style="margin:0 8px 8px 0" onclick="state.selected='${c.name}';render()">${c.name}</button>`).join("")}</div></div><div class="card"><h3>${s.name}</h3><div class="small">分類：${s.group}｜元素：${s.element}</div><div class="small" style="margin-top:10px"><b>正位：</b>${s.upright}</div><div class="small" style="margin-top:10px"><b>逆位：</b>${s.reversed}</div><div class="small" style="margin-top:10px"><b>心理分析：</b>${s.psychology}</div><div class="small" style="margin-top:10px"><b>解讀建議：</b>${s.advice}</div></div></div>`;}render();</script></body></html>
